<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - Fortnite Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --azul-fortnite: #00e5ff;
            --morado-fortnite: #9d00ff;
            --amarillo-vbucks: #fbff00;
            --verde-skin: #4caf50;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            color: white;
            background: black;
            overflow: hidden;
            /* Se bloquea hasta que presionen iniciar */
        }

        /* --- PANTALLA INICIAL (EL OVERLAY) --- */
        #capa-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--morado-fortnite), #000);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.8s ease;
        }

        .boton-entrada {
            font-family: 'Luckiest Guy', cursive;
            font-size: 2rem;
            padding: 20px 40px;
            background: var(--amarillo-vbucks);
            color: black;
            border: 4px solid white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px var(--amarillo-vbucks);
            animation: latido 1.5s infinite;
        }

        /* --- ANIMACIONES --- */
        @keyframes neon-cambiante {

            0%,
            100% {
                border-color: var(--azul-fortnite);
                box-shadow: 0 0 15px var(--azul-fortnite);
            }

            50% {
                border-color: var(--morado-fortnite);
                box-shadow: 0 0 30px var(--morado-fortnite);
            }
        }

        @keyframes glitch {
            0% {
                transform: translate(0);
                text-shadow: 2px 2px var(--morado-fortnite);
            }

            20% {
                transform: translate(-2px, 2px);
                text-shadow: -2px -2px var(--azul-fortnite);
            }

            100% {
                transform: translate(0);
            }
        }

        @keyframes latido {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        /* --- VIDEO DE FONDO --- */
        .contenedor-video-fondo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            overflow: hidden;
        }

        #video-fondo {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        .capa-oscura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -5;
        }

        /* --- CONTENIDO --- */
        .contenido-principal {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            display: none;
            /* Se activa por JS */
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3.5rem;
            color: var(--amarillo-vbucks);
            margin: 20px 0;
            animation: glitch 1s infinite;
        }

        .video-musical-frame {
            width: 100%;
            border-radius: 20px;
            border: 4px solid var(--azul-fortnite);
            margin: 20px 0;
            animation: neon-cambiante 3s infinite ease-in-out;
        }

        .tarjeta-gamer {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--morado-fortnite);
            border-radius: 20px;
            padding: 25px;
            margin: 25px 0;
            backdrop-filter: blur(10px);
            animation: neon-cambiante 4s infinite;
        }

        .tarjeta-gamer h2 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--azul-fortnite);
            margin-bottom: 15px;
        }

        .boton-rsvp {
            display: block;
            background: var(--verde-skin);
            color: white;
            padding: 20px;
            text-decoration: none;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8rem;
            border-radius: 50px;
            border: 3px solid white;
            margin: 30px 0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            animation: latido 1.5s infinite;
        }

        .btn-maps {
            display: inline-block;
            margin-top: 15px;
            color: var(--azul-fortnite);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--azul-fortnite);
            padding: 10px 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-maps:hover {
            background: var(--azul-fortnite);
            color: black;
        }

        .contenedor-mapa {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--azul-fortnite);
            margin-top: 15px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div id="capa-inicial">
        <h2 style="font-family: 'Luckiest Guy'; font-size: 2.5rem; margin-bottom: 30px;">MISIÓN DETECTADA</h2>
        <button class="boton-entrada" onclick="desplegarInvitacion()">ENTRAR AL BUS</button>
    </div>

    <div class="contenedor-video-fondo">
        <video autoplay muted loop playsinline id="video-fondo">
            <source src="images/video_fortnite.mp4" type="video/mp4">
        </video>
    </div>

    <div class="capa-oscura"></div>

    <div class="contenido-principal" id="invitacion-main">
        <h1>¡BATTLE PARTY!</h1>

        <video id="video-musica" class="video-musical-frame" playsinline>
            <source src="images/videoFiesta.mp4" type="video/mp4">
        </video>

        <div class="tarjeta-gamer">
            <h2>DETALLES DEL SQUAD</h2>
            <p>📅 <strong>FECHA:</strong> 5 de mayo</p>
            <p>⏰ <strong>HORARIO:</strong> 4:00 PM - 9:00 PM</p>
            <p>📍 <strong>SALÓN:</strong> Chiquimundo</p>
            <p style="font-size: 0.8rem;">La Florida 701, Aztlán, 34129 Durango, Dgo.</p>
        </div>

        <a href="https://forms.gle/tj3CqQuTtdtAk1SW9" class="boton-rsvp">CONFIRMAR ASISTENCIA</a>

        <div class="tarjeta-gamer">
            <h2>ZONA DE ATERRIZAJE</h2>
            <div class="contenedor-mapa">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3644.204555891784!2d-104.6548545!3d24.02388!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x869bb7f10b2a7e7f%3A0x7d0a203f3e5c7a4!2sLa%20Florida%20701%2C%20Aztl%C3%A1n%2C%2034129%20Durango%2C%20Dgo.!5e0!3m2!1ses!2smx!4v1700000000000" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>
            <a href="https://maps.app.goo.gl/1NG2PA8c9sepKZuAA" target="_blank" class="btn-maps">
                ➔ ABRIR EN GOOGLE MAPS
            </a>
        </div>

        <footer style="padding: 20px; opacity: 0.5; font-size: 0.8rem;">
            PREPÁRATE PARA EL SALTO // 2026
        </footer>
    </div>

    <script>
        function desplegarInvitacion() {
            const capaCarga = document.getElementById('capa-inicial');
            const bloquePrincipal = document.getElementById('invitacion-main');
            const videoFiesta = document.getElementById('video-musica');

            capaCarga.style.opacity = '0';

            setTimeout(() => {
                capaCarga.style.display = 'none';
                bloquePrincipal.style.display = 'block';
                document.body.style.overflow = 'auto'; // Permitir scroll

                // Reproducir el video con sonido ahora que hubo interacción
                videoFiesta.play().catch(error => {
                    console.log("Audio bloqueado por el sistema", error);
                });
            }, 800);
        }
    </script>

</body>

</html>

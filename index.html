<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - Fortnite Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primario: #00e5ff;
            --color-secundario: #9d00ff;
            --color-acento: #fbff00;
        }

        /* --- RESET Y ESTRUCTURA BASE --- */
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            color: white;
            /* Eliminamos el color negro de fondo para que no tape nada */
            background: transparent; 
            overflow-x: hidden;
        }

        /* --- VIDEO DE FONDO (LA SOLUCIÓN REAL) --- */
        .contenedor-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10; /* Lo mandamos al fondo del todo */
            overflow: hidden;
        }

        #video-fondo {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Esto hace que el video cubra toda la pantalla sin deformarse */
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Capa oscura para que el texto sea legible */
        .capa-oscura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* 60% de oscuridad */
            z-index: -5; /* Encima del video, debajo del texto */
        }

        /* --- CONTENIDO --- */
        .contenido {
            position: relative;
            z-index: 10; /* Encima de todo */
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        /* --- ESTILOS VISUALES --- */
        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3.5rem;
            color: var(--color-acento);
            text-shadow: 4px 4px var(--color-secundario);
            margin: 20px 0;
            line-height: 1;
        }

        .foto-central {
            width: 100%;
            border-radius: 20px;
            border: 4px solid var(--color-primario);
            box-shadow: 0 0 20px var(--color-primario);
            margin: 20px 0;
        }

        .tarjeta-info {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--color-secundario);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            backdrop-filter: blur(5px);
        }

        .tarjeta-info h2 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--color-primario);
            margin-bottom: 10px;
        }

        .boton-confirmar {
            display: block;
            background: #4caf50;
            color: white;
            padding: 15px;
            text-decoration: none;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8rem;
            border-radius: 50px;
            border: 3px solid white;
            margin: 30px 0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        /* --- MAPA --- */
        .contenedor-mapa {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--color-primario);
        }

        iframe { width: 100%; height: 100%; border: none; }

    </style>
</head>
<body>

    <div class="contenedor-video">
        <video autoplay muted loop playsinline id="video-fondo">
            <source src="images/video_fortnite.mp4" type="video/mp4">
        </video>
    </div>

    <div class="capa-oscura"></div>

    <div class="contenido">
        <h1>¡VICTORY ROYALE!</h1>
        
        <img src="images/foto_portada.jpg" alt="Portada" class="foto-central">

        <div class="tarjeta-info">
            <h2>MISIÓN: CUMPLE DE ROMÁN</h2>
            <p>📅 <strong>CUÁNDO:</strong> Hoy mismo</p>
            <p>⏰ <strong>HORA:</strong> 4:00 PM - 9:00 PM</p>
            <p>📍 <strong>DÓNDE:</strong> Salón Chiquimundo</p>
            <p style="font-size: 0.9rem;">La Florida 701, Aztlán, 34129 Durango, Dgo.</p>
        </div>

        <a href="TU_LINK_DE_FORMULARIO" class="boton-confirmar">¡ME UNO AL SQUAD!</a>

        <div class="tarjeta-info">
            <h2>COORDENADAS</h2>
            <div class="contenedor-mapa">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3644.2059344465493!2d-104.66170682559533!3d24.023812877114175!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x869bb799516640c3%3A0xe54955b552306796!2sChiquimundo!5e0!3m2!1ses-419!2smx!4v1711200000000!5m2!1ses-419!2smx"></iframe>
            </div>
            <br>
            <a href="https://maps.app.goo.gl/u6hLsWaRUDcSrxq56?g_st=aw" style="color: var(--color-primario);">Abrir en Maps</a>
        </div>

        <footer style="padding: 20px; opacity: 0.6; font-size: 0.8rem;">
            Diseñado para el Battle Bus 2026
        </footer>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Birthday - Invitación</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        /* Definición de variables para facilitar cambios */
        :root {
            --azul-electrico: #00e5ff;
            --morado-vibrante: #9d00ff;
            --amarillo-brillante: #fbff00;
            --fondo-negro: #0b0b0b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--fondo-negro);
            color: white;
            font-family: 'Luckiest Guy', cursive;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Fondo con efecto de "rejilla" estilo videojuego */
        .capa-fondo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--morado-vibrante) 1px, transparent 1px),
                linear-gradient(90deg, var(--morado-vibrante) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            z-index: -1;
        }

        .contenedor {
            width: 90%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        /* --- ANIMACIONES DE TEXTO --- */
        
        /* Efecto de pulso y brillo para el título */
        @keyframes pulsoBrillo {
            0% { transform: scale(1); text-shadow: 0 0 10px var(--azul-electrico); }
            50% { transform: scale(1.05); text-shadow: 0 0 30px var(--morado-vibrante), 0 0 50px var(--azul-electrico); }
            100% { transform: scale(1); text-shadow: 0 0 10px var(--azul-electrico); }
        }

        .titulo-principal {
            font-size: 2.5rem;
            color: var(--amarillo-brillante);
            margin-bottom: 10px;
            animation: pulsoBrillo 2s infinite ease-in-out;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Animación para que los textos floten suavemente */
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .video-marco {
            width: 100%;
            border: 5px solid;
            border-image: linear-gradient(to right, var(--azul-electrico), var(--morado-vibrante)) 1;
            box-shadow: 0 0 25px var(--morado-vibrante);
            border-radius: 10px; /* Nota: border-image a veces anula el radius en ciertos navegadores */
            margin: 20px 0;
            animation: flotar 4s infinite ease-in-out;
        }

        /* --- BOTONES Y LLAMADOS A LA ACCIÓN --- */

        .boton-confirmar {
            display: block;
            background: linear-gradient(45deg, #4caf50, #8bc34a);
            color: white;
            padding: 20px;
            font-size: 1.5rem;
            text-decoration: none;
            border-radius: 50px;
            margin: 30px 0;
            border: 3px solid #ffffff;
            box-shadow: 0 5px 15px rgba(0,255,0,0.4);
            transition: 0.3s;
            animation: pulsoBrillo 1.5s infinite;
        }

        .boton-confirmar:active {
            transform: scale(0.9);
        }

        /* Sección de ubicación */
        .caja-ubicacion {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed var(--azul-electrico);
            padding: 20px;
            border-radius: 15px;
            margin-top: 40px;
        }

        .qr-imagen {
            width: 180px;
            border: 5px solid white;
            border-radius: 10px;
            transition: transform 0.5s;
        }

        .qr-imagen:hover {
            transform: rotate(5deg) scale(1.1);
        }

        .texto-secundario {
            font-family: 'Permanent Marker', cursive;
            color: var(--azul-electrico);
            font-size: 1.2rem;
            margin-top: 15px;
        }

    </style>
</head>
<body>

    <div class="capa-fondo"></div>

    <div class="contenedor">
        <h1 class="titulo-principal">¡DROPPING IN!</h1>
        <p style="font-size: 1.2rem;">EL SQUAD DE **[NOMBRE]** TE NECESITA</p>

        <video class="video-marco" autoplay muted loop playsinline>
            <source src="images/video_fortnite.mp4" type="video/mp4">
            Cargando mensaje importante...
        </video>

        <p class="texto-secundario">¿LISTO PARA EL BATTLE BUS?</p>

        <a href="URL_DE_TU_GOOGLE_FORM" class="boton-confirmar">
            UNIRSE AL EQUIPO
        </a>

        <div class="caja-ubicacion">
            <h2 style="color: var(--amarillo-brillante);">COORDENADAS DE CAÍDA</h2>
            <img src="images/qr_ubicacion.png" alt="QR Maps" class="qr-imagen">
            <p style="margin-top: 10px;">Escanea el mapa para llegar al punto de encuentro</p>
        </div>

        <footer style="margin-top: 40px; font-size: 0.7rem; opacity: 0.5;">
            NO SE REQUIEREN V-BUCKS PARA ENTRAR | VERSIÓN 2026.1
        </footer>
    </div>

</body>
</html>

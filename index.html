<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - Fortnite Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-fortnite: #00e5ff;
            --morado-fortnite: #9d00ff;
            --amarillo-vbucks: #fbff00;
            --verde-skin: #4caf50;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            color: white;
            background: black; 
            overflow: hidden; /* Bloqueamos scroll hasta que inicien */
        }

        /* --- PANTALLA DE INICIO (OVERLAY) --- */
        #pantalla-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--morado-fortnite), #000);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.8s ease;
        }

        .boton-iniciar {
            font-family: 'Luckiest Guy', cursive;
            font-size: 2rem;
            padding: 20px 40px;
            background: var(--amarillo-vbucks);
            color: black;
            border: 4px solid white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px var(--amarillo-vbucks);
            animation: pulse 1.5s infinite;
        }

        /* --- VIDEO DE FONDO --- */
        .contenedor-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
            overflow: hidden;
        }

        #video-fondo {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }

        .capa-oscura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -5;
        }

        /* --- CONTENIDO --- */
        .contenido {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            display: none; /* Oculto hasta que den clic */
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3.5rem;
            color: var(--amarillo-vbucks);
            margin: 20px 0;
            animation: glitch 1s infinite;
        }

        /* --- VIDEO DE PORTADA (CON MÚSICA) --- */
        .video-portada-frame {
            width: 100%;
            border-radius: 20px;
            border: 4px solid var(--azul-fortnite);
            box-shadow: 0 0 25px var(--azul-fortnite);
            margin: 20px 0;
            animation: flotar 3s infinite ease-in-out;
        }

        .tarjeta-info {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--morado-fortnite);
            border-radius: 20px;
            padding: 25px;
            margin: 25px 0;
            backdrop-filter: blur(10px);
        }

        .boton-confirmar {
            display: block;
            background: var(--verde-skin);
            color: white;
            padding: 20px;
            text-decoration: none;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8rem;
            border-radius: 50px;
            border: 3px solid white;
            margin: 30px 0;
        }

        .contenedor-mapa {
            width: 100%;
            height: 280px;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid var(--azul-fortnite);
        }

        iframe { width: 100%; height: 100%; border: none; }

        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 2px 2px var(--morado-fortnite); }
            20% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="pantalla-inicial">
        <h2 style="font-family: 'Luckiest Guy'; font-size: 2.5rem; margin-bottom: 30px;">MISIÓN DETECTADA</h2>
        <button class="boton-iniciar" onclick="iniciarExperiencia()">ENTRAR AL BUS</button>
    </div>

    <div class="contenedor-video">
        <video autoplay muted loop playsinline id="video-fondo">
            <source src="images/video_fortnite.mp4" type="video/mp4">
        </video>
    </div>

    <div class="capa-oscura"></div>

    <div class="contenido" id="contenedor-principal">
        <h1>¡BATTLE PARTY!</h1>
        
        <video id="video-musical" class="video-portada-frame" playsinline>
            <source src="images/videoFiesta.mp4" type="video/mp4">
        </video>

        <div class="tarjeta-info">
            <h2>DETALLES DEL SQUAD</h2>
            <p>⏰ <strong>HORARIO:</strong> 4:00 PM - 9:00 PM</p>
            <p>📍 <strong>SALÓN:</strong> Chiquimundo</p>
            <p style="font-size: 0.9rem;">La Florida 701, Aztlán, 34129 Durango, Dgo.</p>
        </div>

        <a href="TU_LINK_DE_FORMULARIO" class="boton-confirmar">CONFIRMAR ASISTENCIA</a>

        <div class="tarjeta-info">
            <h2>ZONA DE ATERRIZAJE</h2>
            <div class="contenedor-mapa">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3644.2082260654!2d-104.6465056!3d24.0235338!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x869bb7956a632731%3A0xc069f2010c73295!2sLa%20Florida%20701%2C%20Aztl%C3%A1n%2C%2034129%20Durango%2C%20Dgo.!5e0!3m2!1ses-419!2smx!4v1714100000000" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <script>
        function iniciarExperiencia() {
            const overlay = document.getElementById('pantalla-inicial');
            const contenido = document.getElementById('contenedor-principal');
            const videoMusica = document.getElementById('video-musical');

            // 1. Ocultar la pantalla de inicio
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                contenido.style.display = 'block';
                document.body.style.overflow = 'auto'; // Habilitar scroll
                
                // 2. Intentar reproducir el video con música
                videoMusica.play().catch(error => {
                    console.log("El navegador bloqueó el audio automático:", error);
                });
            }, 800);
        }
    </script>

</body>
</html>

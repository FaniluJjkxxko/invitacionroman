<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación - Fortnite Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primario: #00e5ff;
            --color-secundario: #9d00ff;
            --color-acento: #fbff00;
            --sombra-texto: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            color: white;
            background-color: black;
            text-align: center;
        }

        /* --- VIDEO DE FONDO --- */
        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        /* Capa oscura para legibilidad */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 3rem;
            color: var(--color-acento);
            text-shadow: 4px 4px var(--color-secundario);
            margin: 20px 0;
            animation: pulse 2s infinite;
        }

        /* --- IMAGEN CENTRAL --- */
        .image-placeholder {
            width: 100%;
            border-radius: 15px;
            border: 4px solid var(--color-primario);
            box-shadow: 0 0 20px var(--color-primario);
            margin-bottom: 20px;
        }

        /* --- TARJETA DE INFORMACIÓN --- */
        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 20px 0;
        }

        .info-card h2 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--color-primario);
            margin: 10px 0;
        }

        .btn-rsvp {
            display: inline-block;
            background: linear-gradient(45deg, #4caf50, #8bc34a);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.5rem;
            border-radius: 50px;
            margin: 20px 0;
            border: 2px solid white;
            transition: transform 0.2s;
        }

        .btn-rsvp:active {
            transform: scale(0.95);
        }

        /* --- MAPA --- */
        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--color-primario);
            margin-top: 15px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-background">
        <source src="images/video_fortnite.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="main-container">
        <h1>¡VICTORY ROYALE!</h1>
        
        <img src="images/foto_portada.jpg" alt="Fiesta Fortnite" class="image-placeholder">

        <div class="info-card">
            <h2>DETALLES DE LA MISIÓN</h2>
            <p><strong>SALÓN:</strong> Chiquimundo</p>
            <p><strong>HORARIO:</strong> 4:00 PM - 9:00 PM</p>
            <p><strong>DIRECCIÓN:</strong> La Florida 701, Aztlán, 34129 Durango, Dgo.</p>
        </div>

        <a href="TU_LINK_DE_GOOGLE_FORMS" class="btn-rsvp">CONFIRMAR ASISTENCIA</a>

        <div class="info-card">
            <h2>UBICACIÓN</h2>
            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3644.200000000000!2d-104.6500000!3d24.0300000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjTCsDAxJzQ4LjAiTiAxMDTCsDM5JzAwLjAiVw!5e0!3m2!1ses!2smx!4v1620000000000!5m2!1ses!2smx" 
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>
            <p style="margin-top: 10px; font-size: 0.9rem;">
                <a href="https://maps.app.goo.gl/u6hLsWaRUDcSrxq56?g_st=aw" style="color: var(--color-primario);">Abrir en Google Maps</a>
            </p>
        </div>

        <footer style="margin-bottom: 30px; opacity: 0.7; font-size: 0.8rem;">
            Prepárate para el mejor Squad del año
        </footer>
    </div>

</body>
</html>
